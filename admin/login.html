<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Sagara Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
    </style>
</head>
<body class="flex items-center justify-center h-screen">
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md p-8">
        <div class="text-center mb-8">
            <div class="w-16 h-16 bg-primary/10 rounded-full flex items-center justify-center mx-auto mb-4">
                <svg class="w-8 h-8 text-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4m6 6v10m6-2a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4"></path>
                </svg>
            </div>
            <h1 class="text-2xl font-bold text-gray-800">Sagara Admin</h1>
            <p class="text-gray-500 text-sm mt-2">Masuk ke dashboard kontrol</p>
        </div>

        <form method="POST" action="/admin/login" class="space-y-5">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Username</label>
                <input type="text" name="username" required 
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary outline-none transition"
                    placeholder="Masukkan username">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                <input type="password" name="password" required
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary outline-none transition"
                    placeholder="Masukkan password">
            </div>
            
            <!-- Pilihan redirect setelah login -->
            <div class="space-y-2">
                <label class="block text-sm font-medium text-gray-700 mb-2">Redirect setelah login:</label>
                <div class="flex gap-4">
                    <label class="flex items-center gap-2 cursor-pointer">
                        <input type="radio" name="redirectTo" value="dashboard" checked class="w-4 h-4 text-primary">
                        <span class="text-sm">📊 Dashboard Admin</span>
                    </label>
                    <label class="flex items-center gap-2 cursor-pointer">
                        <input type="radio" name="redirectTo" value="homepage" class="w-4 h-4 text-primary">
                        <span class="text-sm">🏠 Halaman Utama Website</span>
                    </label>
                </div>
            </div>
            
            <button type="submit" 
                class="w-full bg-primary hover:bg-primary/90 text-white font-semibold py-2 px-4 rounded-lg transition duration-200">
                Login
            </button>
        </form>

        <div class="mt-6 p-4 bg-gray-50 rounded-lg">
            <p class="text-xs text-gray-500 text-center mb-2">📝 Akun Demo:</p>
            <div class="text-xs text-gray-600 space-y-1">
                <div class="flex justify-between"><span>Username:</span><span class="font-mono font-semibold">sagara</span></div>
                <div class="flex justify-between"><span>Password:</span><span class="font-mono font-semibold">admin123</span></div>
            </div>
            <div class="border-t mt-2 pt-2 text-xs text-gray-400 text-center">
                Atau: admin/sagara2024 | samuel/muffin123
            </div>
        </div>
        
        <!-- Tombol kembali ke homepage -->
        <div class="mt-4 text-center">
            <a href="/" class="text-sm text-primary hover:underline">← Kembali ke Website Utama</a>
        </div>
    </div>
</body>
</html>
